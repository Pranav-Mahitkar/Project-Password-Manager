version: '3.9'

services:
  mongo:
    image: mongo:7.0
    container_name: pm_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
      MONGO_INITDB_DATABASE: password_manager
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - '27018:27017'
    networks:
      - pm_net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pm_server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongo:27017/password_manager?authSource=admin
      SESSION_SECRET: ${SESSION_SECRET}
      SERVER_KEK: ${SERVER_KEK}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:5000/api/auth/google/callback}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    ports:
      - '5000:5000'
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - pm_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pm_client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
      # Inside Docker, Vite's proxy must target the compose service name, not localhost
      VITE_SERVER_URL: http://server:5000
    ports:
      - '5173:5173'
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - pm_net

volumes:
  mongo_data:

networks:
  pm_net:
    driver: bridge